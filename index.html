<!DOCTYPE html>
<html lang='en'>
  <head>
    <meta charset='utf-8'>
    <meta content='width=device-width, initial-scale=1' name='viewport'>
    <meta content='Stefan Penner — software engineer in Salt Lake City. Open source contributor. Happiest in the mountains — by ski, bike, boot, or lens.' name='description'>
    <title>iamstef.net: Stefan Penner</title>
    <link href='/favicon.svg' rel='icon' type='image/svg+xml'>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --ink: #1a1a1a;
        --muted: #767676;
        --rule: #dadada;
        --accent: #b45309; /* alpenglow */
        --grid: rgba(26, 26, 26, 0.055);
        --grid-bright: color-mix(in srgb, var(--accent) 12%, transparent);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #16150f;
          --ink: #e8e6df;
          --muted: #999488;
          --rule: #3a382f;
          --accent: #e0913f;
          --grid: rgba(232, 230, 223, 0.05);
          --grid-bright: color-mix(in srgb, var(--accent) 16%, transparent);
        }
      }

      /* registered so the browser can interpolate it as a color */
      @property --accent {
        syntax: '<color>';
        inherits: true;
        initial-value: #b45309;
      }

      /* hue-ordered: alpenglow → pine → lake → bluebird → wildflower → red rock */
      @keyframes accent-cycle-light {
        0%   { --accent: #b45309; }
        16%  { --accent: #4d7c0f; }
        33%  { --accent: #0f766e; }
        50%  { --accent: #0e6ba8; }
        66%  { --accent: #6b4fa0; }
        83%  { --accent: #9c3d1e; }
        100% { --accent: #b45309; }
      }

      @keyframes accent-cycle-dark {
        0%   { --accent: #e0913f; }
        16%  { --accent: #a3c162; }
        33%  { --accent: #4fb8ab; }
        50%  { --accent: #6fb7e0; }
        66%  { --accent: #b39ddb; }
        83%  { --accent: #e0784f; }
        100% { --accent: #e0913f; }
      }

      :root {
        animation: accent-cycle-light 25s linear infinite;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          animation-name: accent-cycle-dark;
        }
      }

      * {
        margin: 0;
        padding: 0;
      }

      html, body {
        height: 100%;
      }

      body {
        display: grid;
        grid-template-columns: minmax(0, 32em);
        align-content: center;
        justify-content: center;
        padding: 2em;
        box-sizing: border-box;
        font-family: corbel, "avenir next", "lucida grande", system-ui, sans-serif;
        background: var(--bg);
        color: var(--ink);
        -webkit-text-size-adjust: 100%;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        background:
          linear-gradient(var(--grid) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid) 1px, transparent 1px);
        background-size: 3em 3em;
        -webkit-mask-image: linear-gradient(135deg, transparent 12%, rgb(0 0 0 / 0.75) 50%, transparent 88%);
        mask-image: linear-gradient(135deg, transparent 12%, rgb(0 0 0 / 0.75) 50%, transparent 88%);
      }

      /* grid wakes up near the cursor; parked off-screen until the mouse moves */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        background:
          linear-gradient(var(--grid-bright) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid-bright) 1px, transparent 1px);
        background-size: 3em 3em;
        -webkit-mask-image: radial-gradient(circle 9em at var(--mx, -100em) var(--my, -100em), black, transparent 85%);
        mask-image: radial-gradient(circle 9em at var(--mx, -100em) var(--my, -100em), black, transparent 85%);
      }

      main {
        text-align: center;
      }

      h1 {
        font-family: georgia, serif;
        font-variant: small-caps;
        font-weight: normal;
        font-size: clamp(2.5em, 8vw, 4em);
        line-height: 1.1;
        word-spacing: -0.125em;
      }

      .tagline {
        font-family: georgia, serif;
        font-variant: small-caps;
        color: var(--accent);
        margin: 0.25em 0 2em;
        font-size: clamp(1em, 2.5vw, 1.15em);
      }

      .bio {
        font-size: clamp(1em, 2.5vw, 1.15em);
        line-height: 1.7;
        margin-bottom: 2em;
      }

      a {
        font-variant: small-caps;
        color: var(--ink);
        text-decoration: none;
        border-bottom: 1px solid var(--rule);
        background: linear-gradient(var(--accent), var(--accent)) no-repeat left bottom / 0% 1px;
        transition: background-size 0.25s ease;
      }

      a:hover {
        background-size: 100% 1px;
        border-bottom-color: transparent;
      }

      nav a {
        margin: 0 0.5em;
      }

      footer {
        margin-top: 3em;
        font-size: 0.8em;
      }

      footer a {
        color: var(--muted);
      }

      ::selection {
        background: var(--accent);
        color: var(--bg);
      }

      @media (prefers-reduced-motion: reduce) {
        :root {
          animation: none;
        }

        body::after {
          display: none;
        }

        a {
          transition: none;
        }
      }
    </style>
    <meta content='Stefan Penner' property='og:title'>
    <meta content='Software engineer in Salt Lake City. Open source contributor.' property='og:description'>
    <meta content='https://iamstef.net/' property='og:url'>
    <meta content='profile' property='og:type'>
    <meta content='https://iamstef.net/og.png' property='og:image'>
    <meta content='1200' property='og:image:width'>
    <meta content='630' property='og:image:height'>
    <meta content='summary_large_image' name='twitter:card'>
    <script type='application/ld+json'>
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Stefan Penner",
      "url": "https://iamstef.net/",
      "jobTitle": "Software Engineer",
      "address": { "@type": "PostalAddress", "addressLocality": "Salt Lake City", "addressRegion": "UT" },
      "sameAs": [
        "https://github.com/stefanpenner",
        "https://twitter.com/stefanpenner",
        "https://instagram.com/stefanpenner"
      ]
    }
    </script>
  </head>
  <body>
    <main>
      <h1>Stefan Penner</h1>
      <p class='tagline'>Nerd &amp; Hacker</p>
      <p class='bio'>
        Software engineer in Salt Lake City.
        Open source contributor.
        Happiest in the mountains &mdash; by ski, bike, boot, or lens.
      </p>
      <nav>
        <a href='https://github.com/stefanpenner'>github</a> &middot;
        <a href='https://twitter.com/stefanpenner'>twitter</a> &middot;
        <a href='https://instagram.com/stefanpenner'>instagram</a> &middot;
        <a href='mailto:stef@iamstef.net'>email</a>
      </nav>
      <footer>
        <a href='https://github.com/stefanpenner/stefanpenner.github.com'>source</a>
      </footer>
    </main>
    <script>
      // start the accent cycle somewhere random
      document.documentElement.style.animationDelay = -(Math.random() * 25).toFixed(2) + 's';

      addEventListener('mousemove', e => {
        const s = document.documentElement.style;
        s.setProperty('--mx', e.clientX + 'px');
        s.setProperty('--my', e.clientY + 'px');
      });

      // tint mobile browser chrome with a whisper of the current accent
      const themeMeta = document.createElement('meta');
      themeMeta.name = 'theme-color';
      document.head.append(themeMeta);
      const darkScheme = matchMedia('(prefers-color-scheme: dark)');
      setInterval(() => {
        const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent');
        const rgb = (accent.match(/[\d.]+/g) || [180, 83, 9]).map(Number);
        const bg = darkScheme.matches ? [22, 21, 15] : [255, 255, 255];
        const mix = bg.map((c, i) => Math.round(c * 0.88 + rgb[i] * 0.12));
        themeMeta.content = 'rgb(' + mix.join(' ') + ')';
      }, 600);
    </script>
  </body>
</html>
